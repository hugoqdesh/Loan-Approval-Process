spring:
  application:
    name: Loan Approval Process

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loan_approval}
    username: ${DB_USERNAME:loan_app}
    password: ${DB_PASSWORD:loan_app}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    clean-disabled: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loan_approval}
    user: ${DB_USERNAME:loan_app}
    password: ${DB_PASSWORD:loan_app}
    locations: classpath:db/migration

loan:
  customer:
    max-age: ${LOAN_CUSTOMER_MAX_AGE:70}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
